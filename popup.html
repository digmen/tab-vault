<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Tab Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="header-title">
      Tab Vault
      <span id="count" class="count">0</span>
    </div>
    <button id="clearAll" class="btn-danger" data-i18n="clearAll">Clear</button>
  </div>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="Search tabs…" data-i18n-placeholder="searchPlaceholder" />
  </div>

  <div id="tabList" class="tab-list"></div>

  <div class="footer">
    <button id="parkCurrent" class="btn-park" data-i18n="parkCurrent">Save current tab</button>
    <button id="restoreAll" class="btn-primary" data-i18n="restoreAll">Restore all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
