<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_common.css" />
<style>
  html, body { background: transparent; }
  .wrap { width: 128px; height: 128px; display: grid; place-items: center; background: transparent; }
  .logo {
    width: 116px; height: 116px; border-radius: 28px;
    background: linear-gradient(150deg, #9384ff 0%, #6a56e8 46%, #4b39c0 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.4),
      inset 0 -10px 26px rgba(28,16,78,.5);
  }
  .logo::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,0) 46%);
  }
  .logo svg { width: 62%; height: 62%; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none">
      <path d="M24 8.5 V26" stroke="#fff" stroke-width="3.6" stroke-linecap="round"/>
      <path d="M16 18 L24 26.5 L32 18" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10.5 29 V35.5 A4 4 0 0 0 14.5 39.5 H33.5 A4 4 0 0 0 37.5 35.5 V29" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>
</body>
</html>
